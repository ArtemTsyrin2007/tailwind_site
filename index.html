<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>My Website</title>
    <style type="text/tailwindcss"></style>
  </head>
  <body>
    <header class="bg-red-200 text-white">
      <div class="container mx-auto p-4">
        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <a href="/">
              <h1 class="text-3xl font-bold font-[Oswald]-600">Bisque</h1></a
            >
          </div>

          <!-- Навигация -->
          <nav class="hidden md:block">
            <ul class="flex space-x-6">
              <li>
                <a href="#" class="hover:text-blue-300 transition">Главная</a>
              </li>
              <li>
                <a href="#" class="hover:text-blue-300 transition">О нас</a>
              </li>
              <li>
                <a href="#" class="hover:text-blue-300 transition">Услуги</a>
              </li>
              <li>
                <a href="#" class="hover:text-blue-300 transition">Контакты</a>
              </li>
            </ul>
          </nav>

          <!-- Мобильное меню (гамбургер) -->
          <button class="md:hidden">
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>
          </button>
        </div>
      </div>
    </header>
  </body>
</html>
